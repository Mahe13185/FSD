<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 (a)</title>
    <script>
        function maxValue() {
            let num1 = parseInt(document.getElementById("num1").value);
            let num2 = parseInt(document.getElementById("num2").value);
            let num3 = parseInt(document.getElementById("num3").value);

            if (isNaN(num1) || isNaN(num2) || isNaN(num3)) {
                alert("Enter valid number...");
            }
            if (num1 == num2 == num3) {
                document.write("Both are equal");
            }
            else {
                let largest = Math.max(num1, num2, num3);
                document.write("Largest Number: " + largest);
            }
        }
    </script>
</head>

<body>
    <h1>Enter 3 values</h1>
    <label for="num1">Enter the first value</label>
        <input type="number" id="num1"> <br>
    <label for="num2">Enter the second value</label>
        <input type="number" id="num2"><br>
    <label for="num3">Enter the third number</label>
        <input type="number" id="num3"><br>
    <button onclick="maxValue()">Submit</button>
</body>

</html>
