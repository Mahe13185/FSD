<!DOCTYPE html>
<html>
<head>

<title>Voter Eligibility Check</title>

<style>

body{
    font-family: Arial;
    text-align: center;
}

table{
    margin: 20px auto;
    border-collapse: collapse;
    width: 50%;
}

th,td{
    border: 1px solid black;
    padding: 10px;
    text-align: center;
}

</style>

</head>

<body>

<h2>Voter Eligibility Checker</h2>

<script>

var name = prompt("Enter your name:");
var age = prompt("Enter your age:");

age = Number(age);

var eligibility;

if(age >= 18)
{
    eligibility = "Eligible to Vote";
}
else
{
    eligibility = "Not Eligible to Vote";
}

document.write("<table>");
document.write("<tr><th>Name</th><th>Age</th><th>Eligibility</th></tr>");
document.write("<tr>");
document.write("<td>" + name + "</td>");
document.write("<td>" + age + "</td>");
document.write("<td>" + eligibility + "</td>");
document.write("</tr>");
document.write("</table>");

</script>

</body>
</html>
