<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 d</title>
    <script>
        var n = parseInt(prompt("Enter a number" , "0"));
        let sum = 0, rem = 0, temp = n;
        while(n!=0){
            rem = n%10;
            sum = sum + (rem * rem * rem);
            n = parseInt(n/10);
        }
        if(temp === sum){
            document.writeln("Amstrong");
        }else{
            document.write("not a amstrong")
        }
    </script>
</head>
