<html>
<head>
<title>JavaScript Functions Example</title>
<script>

function factorial()
{
var n = parseInt(document.getElementById("num").value);
var fact = 1;

for(var i=1; i<=n; i++)
{
fact = fact * i;
}

document.getElementById("result").innerHTML = "Factorial: " + fact;
}

function fibonacci()
{
var n = parseInt(document.getElementById("num").value);
var a = 0, b = 1, c;
var res = a + " " + b + " ";

while(true)
{
c = a + b;
if(c > n)
break;

res = res + c + " ";
a = b;
b = c;
}

document.getElementById("result").innerHTML = "Fibonacci: " + res;
}

function prime()
{
var n = parseInt(document.getElementById("num").value);
var res = "";

for(var i=2; i<=n; i++)
{
var count = 0;

for(var j=1; j<=i; j++)
{
if(i % j == 0)
count++;
}

if(count == 2)
res = res + i + " ";
}

document.getElementById("result").innerHTML = "Prime numbers: " + res;
}

function palindrome()
{
var n = parseInt(document.getElementById("num").value);
var temp = n;
var rev = 0;

while(n > 0)
{
var r = n % 10;
rev = rev * 10 + r;
n = parseInt(n / 10);
}

if(temp == rev)
document.getElementById("result").innerHTML = temp + " is Palindrome";
else
document.getElementById("result").innerHTML = temp + " is Not Palindrome";
}

</script>

</head>

<body>

<h2>JavaScript Number Operations</h2>

Enter Number:
<input type="text" id="num"><br><br>

<button onclick="factorial()">Factorial</button>
<button onclick="fibonacci()">Fibonacci</button>
<button onclick="prime()">Prime</button>
<button onclick="palindrome()">Palindrome</button>

<p id="result"></p>

</body>
</html>
