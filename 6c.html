<html>
<head>
<title>JavaScript Input using Prompt</title>

<script>
function sum()
{
    var a = prompt("Enter A value");
    a = parseInt(a);

    var b = prompt("Enter B value");
    b = parseInt(b);

    document.write("Sum = " + (a + b));
}
</script>

</head>

<body>

<button onclick="sum()">Sum</button>

</body>
</html>
