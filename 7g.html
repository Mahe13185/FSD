<!DOCTYPE html>
<html>
<head>
<title>Date Object Example</title>
<script>
window.onload=function()
{
var date=new Date();

var p1=document.createElement("p");
p1.textContent="Current Date and Time: "+date.toLocaleString();
document.body.appendChild(p1);

var p2=document.createElement("p");
p2.textContent="Year: "+date.getFullYear();
document.body.appendChild(p2);

var p3=document.createElement("p");
p3.textContent="Month: "+(date.getMonth()+1);
document.body.appendChild(p3);

var p4=document.createElement("p");
p4.textContent="Day: "+date.getDate();
document.body.appendChild(p4);

var p5=document.createElement("p");
p5.textContent="Hours: "+date.getHours();
document.body.appendChild(p5);

var p6=document.createElement("p");
p6.textContent="Minutes: "+date.getMinutes();
document.body.appendChild(p6);

var p7=document.createElement("p");
p7.textContent="Seconds: "+date.getSeconds();
document.body.appendChild(p7);
}
</script>
</head>
<body>
</body>
</html>
