<!DOCTYPE html>
<html>
<head>
<title>Regex Example</title>
<script>
window.onload=function()
{
var name="Arjun Kumar";

var regex=/^[A-Za-z\s]+$/;

var p1=document.createElement("p");
p1.textContent="Valid Name: "+regex.test(name);
document.body.appendChild(p1);

var match=name.match(/[A-Z][a-z]+/);
var p2=document.createElement("p");
p2.textContent="First word: "+match;
document.body.appendChild(p2);

var index=name.search(/\s/);
var p3=document.createElement("p");
p3.textContent="Space index: "+index;
document.body.appendChild(p3);

var replaced=name.replace(/\s/g,"");
var p4=document.createElement("p");
p4.textContent="Without space: "+replaced;
document.body.appendChild(p4);

var exec=regex.exec(name);
var p5=document.createElement("p");
p5.textContent="Exec result: "+exec;
document.body.appendChild(p5);
}
</script>
</head>
<body>
</body>
</html>
