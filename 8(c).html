<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 c</title>
    <script>
        function fordisplay() {
            for (let i = 0; i <= 10; i++) {
                document.writeln(i)
            }
        }
        function whiledisplay() {
            let i = 1;
            while (i <= 10) {
                document.writeln(i);
                i++
            }
        }
        function dowhiledisplay(){
            let i = 1;
            do {
                document.writeln(i);
                i++;
            } while (i <= 10);
        }
    </script>
</head>

<body>
    <button onclick="fordisplay()">for </button>
    <button onclick="whiledisplay()">while      </button>
    <button onclick="dowhiledisplay()">do while</button>
</body>

</html>
