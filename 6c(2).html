<html>
<head>
<title>JavaScript Input using Form</title>

<script>
function sum()
{
    var a = parseInt(f1.value1.value);
    var b = parseInt(f1.value2.value);

    alert(a + b);
}
</script>

</head>

<body>

<form name="f1">

Enter A value:
<input type="text" name="value1"><br><br>

Enter B value:
<input type="text" name="value2"><br><br>

<button type="button" onclick="sum()">Sum</button>

</form>

</body>
</html>
