<!DOCTYPE html>
<html>
<head>
<title>Math Object Example</title>
<script>
function Student(name,branch,marks,total)
{
this.name=name;
this.id="A"+Math.floor(Math.random()*1000);
this.branch=branch;
this.marks=marks;
this.total=total;
this.percentage=Math.round((marks/total)*100);

this.display=function()
{
var div=document.createElement("div");
div.innerHTML="<h2>Student Details</h2>"+
"<p>Name: "+this.name+"</p>"+
"<p>ID: "+this.id+"</p>"+
"<p>Branch: "+this.branch+"</p>"+
"<p>Marks: "+this.marks+"</p>"+
"<p>Percentage: "+this.percentage+"%</p>";
document.body.appendChild(div);
}
}

window.onload=function()
{
var s=new Student("Arjun","CSE",432,500);
s.display();
}
</script>
</head>
<body>
</body>
</html>
